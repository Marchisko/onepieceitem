<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPItem — One Piece Card Tracker</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c56d;
    --red: #c0392b;
    --dark: #0a0710;
    --dark2: #110e1a;
    --dark3: #1a1528;
    --dark4: #241e38;
    --border: rgba(201,168,76,0.15);
    --text: #e8e0d0;
    --muted: #7a7090;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; }

  /* Background texture */
  body::before {
    content:'';
    position:fixed; inset:0; z-index:0;
    background: radial-gradient(ellipse at 20% 0%, rgba(192,57,43,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(201,168,76,0.06) 0%, transparent 60%);
    pointer-events:none;
  }

  /* Header */
  .header {
    position:sticky; top:0; z-index:50;
    background: rgba(10,7,16,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
  }
  .header-inner {
    max-width: 800px; margin: 0 auto;
    display:flex; align-items:center; gap:12px;
    height: 56px;
  }
  .logo {
    font-family:'Cinzel',serif;
    font-size:17px; font-weight:900;
    color:var(--gold);
    letter-spacing:0.05em;
    white-space:nowrap;
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
  }
  .logo span { color:var(--red); }
  .search-wrap { flex:1; position:relative; }
  .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:15px; }
  .search-input {
    width:100%; background:var(--dark3);
    border:1px solid var(--border);
    border-radius:24px; padding:9px 16px 9px 36px;
    color:var(--text); font-size:14px; font-family:'DM Sans',sans-serif;
    outline:none; transition:border-color 0.2s;
  }
  .search-input:focus { border-color:rgba(201,168,76,0.4); }
  .search-input::placeholder { color:var(--muted); }

  /* Filters */
  .filters {
    display:flex; gap:6px; padding:10px 16px;
    overflow-x:auto; border-bottom:1px solid var(--border);
    scrollbar-width:none;
    background: var(--dark2);
  }
  .filters::-webkit-scrollbar { display:none; }
  .chip {
    background:transparent; border:1px solid var(--border);
    color:var(--muted); padding:5px 14px;
    border-radius:20px; font-size:12px; font-family:'DM Sans',sans-serif;
    cursor:pointer; white-space:nowrap; transition:all 0.2s;
  }
  .chip:hover { border-color:var(--gold); color:var(--gold); }
  .chip.active { background:var(--gold); border-color:var(--gold); color:#000; font-weight:600; }

  /* Stats bar */
  .stats-bar {
    padding:8px 16px; font-size:12px; color:var(--muted);
    background:var(--dark2); border-bottom:1px solid var(--border);
    position:relative; z-index:1;
  }
  .stats-bar span { color:var(--gold-light); font-weight:600; }

  /* Grid */
  .grid-wrap { padding:12px 12px 80px; position:relative; z-index:1; }
  .grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap:10px;
    max-width:800px; margin:0 auto;
  }

  /* Card */
  .card {
    background:var(--dark3); border-radius:10px;
    overflow:hidden; cursor:pointer;
    border:1px solid var(--border);
    transition:transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    animation: fadeIn 0.3s ease both;
  }
  .card:hover {
    transform:translateY(-3px) scale(1.02);
    border-color:rgba(201,168,76,0.4);
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .card-img-wrap { position:relative; aspect-ratio:6/8.5; background:var(--dark4); overflow:hidden; }
  .card-img { width:100%; height:100%; object-fit:cover; display:block; }
  .card-img.loading { opacity:0; transition:opacity 0.3s; }
  .card-img.loaded { opacity:1; }
  .card-placeholder { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:28px; }

  .rarity-banner {
    position:absolute; top:0; left:0; right:0;
    height:3px;
  }
  .r-Leader { background:linear-gradient(90deg,#7c3aed,#a855f7); }
  .r-SecretRare { background:linear-gradient(90deg,#c0392b,#e74c3c); }
  .r-SuperRare { background:linear-gradient(90deg,#b45309,#f59e0b); }
  .r-Rare { background:linear-gradient(90deg,#1d4ed8,#3b82f6); }
  .r-Uncommon { background:linear-gradient(90deg,#065f46,#10b981); }
  .r-Common { background:#374151; }
  .r-Special { background:linear-gradient(90deg,#be185d,#ec4899); }
  .r-Promo { background:linear-gradient(90deg,#c9a84c,#e8c56d); }

  .card-body { padding:7px 8px 8px; }
  .card-name { font-size:11.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3; }
  .card-sub { display:flex; align-items:center; justify-content:space-between; margin-top:3px; }
  .card-set { font-size:10px; color:var(--muted); }
  .color-dots { display:flex; gap:2px; }
  .dot { width:6px; height:6px; border-radius:50%; }
  .dot-Red{background:#ef4444;} .dot-Blue{background:#3b82f6;} .dot-Green{background:#22c55e;}
  .dot-Yellow{background:#eab308;} .dot-Purple{background:#a855f7;} .dot-Black{background:#9ca3af;}

  /* Loading / Empty */
  .state-msg { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted); }
  .state-msg .icon { font-size:40px; margin-bottom:12px; }
  .state-msg p { font-size:14px; }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* Load more */
  .load-more-wrap { text-align:center; padding:16px; position:relative; z-index:1; }
  .load-more-btn {
    background:transparent; border:1px solid var(--border);
    color:var(--gold); padding:10px 28px; border-radius:24px;
    font-size:13px; font-family:'DM Sans',sans-serif; cursor:pointer;
    transition:all 0.2s;
  }
  .load-more-btn:hover { background:var(--gold); color:#000; }
  .load-more-btn:disabled { opacity:0.4; cursor:default; }

  /* Modal */
  .modal-overlay {
    display:none; position:fixed; inset:0; z-index:100;
    background:rgba(0,0,0,0.85); backdrop-filter:blur(8px);
    justify-content:center; align-items:flex-end;
    padding:0;
  }
  .modal-overlay.open { display:flex; animation:overlayIn 0.2s ease; }
  @keyframes overlayIn { from{opacity:0} to{opacity:1} }

  .modal-sheet {
    background:var(--dark2); border-radius:20px 20px 0 0;
    width:100%; max-width:480px;
    border-top:1px solid var(--border);
    animation:sheetUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
    max-height:92vh; overflow-y:auto;
  }
  @keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

  .modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:12px auto 0; }
  .modal-card-img { width:55%; max-width:220px; display:block; margin:16px auto 0; border-radius:10px; box-shadow:0 12px 40px rgba(0,0,0,0.6); }
  .modal-info { padding:16px 20px 32px; }
  .modal-name { font-family:'Cinzel',serif; font-size:17px; color:var(--gold); font-weight:700; text-align:center; }
  .modal-badges { display:flex; justify-content:center; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .badge { font-size:11px; padding:3px 10px; border-radius:20px; border:1px solid; }
  .badge-rarity { border-color:rgba(201,168,76,0.3); color:var(--gold-light); background:rgba(201,168,76,0.08); }
  .badge-set { border-color:var(--border); color:var(--muted); }
  .badge-color { border-color:var(--border); }

  .modal-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:16px; }
  .stat-box { background:var(--dark3); border-radius:8px; padding:10px; text-align:center; border:1px solid var(--border); }
  .stat-val { font-size:16px; font-weight:700; color:var(--text); }
  .stat-lbl { font-size:10px; color:var(--muted); margin-top:2px; }

  .modal-effect-title { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin:16px 0 6px; }
  .modal-effect { font-size:13px; color:#b0a8c0; line-height:1.6; }
  .modal-trigger { font-size:12px; color:var(--gold-light); margin-top:8px; font-style:italic; }

  .modal-close-btn {
    width:100%; margin-top:20px; padding:13px;
    background:var(--dark4); border:1px solid var(--border);
    color:var(--text); border-radius:12px; font-size:14px;
    font-family:'DM Sans',sans-serif; cursor:pointer;
    transition:background 0.2s;
  }
  .modal-close-btn:hover { background:var(--dark3); }

  /* Bottom nav */
  .bottom-nav {
    position:fixed; bottom:0; left:0; right:0; z-index:40;
    background:rgba(10,7,16,0.95); backdrop-filter:blur(20px);
    border-top:1px solid var(--border);
    display:flex; justify-content:space-around;
    padding:8px 0 max(8px, env(safe-area-inset-bottom));
  }
  .nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px 16px; cursor:pointer; }
  .nav-icon { font-size:20px; }
  .nav-label { font-size:10px; color:var(--muted); }
  .nav-item.active .nav-label { color:var(--gold); }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">OP<span>Item</span></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="Chercher une carte..." id="searchInput" oninput="onSearch()">
    </div>
  </div>
</div>

<div class="filters" id="filters">
  <button class="chip active" onclick="setFilter(null,'rarity',this)">Tout</button>
  <button class="chip" onclick="setFilter('Leader','rarity',this)">Leader</button>
  <button class="chip" onclick="setFilter('SecretRare','rarity',this)">Secret Rare</button>
  <button class="chip" onclick="setFilter('SuperRare','rarity',this)">Super Rare</button>
  <button class="chip" onclick="setFilter('Rare','rarity',this)">Rare</button>
  <button class="chip" onclick="setFilter('Uncommon','rarity',this)">Uncommon</button>
  <button class="chip" onclick="setFilter('Common','rarity',this)">Common</button>
  <button class="chip" onclick="setFilter('Special','rarity',this)">Special</button>
</div>

<div class="stats-bar" id="statsBar">Chargement...</div>

<div class="grid-wrap">
  <div class="grid" id="grid">
    <div class="state-msg"><div class="spinner"></div><p>Chargement des cartes...</p></div>
  </div>
</div>

<div class="load-more-wrap" id="loadMoreWrap" style="display:none">
  <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">Charger plus</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="handleModalClick(event)">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <img class="modal-card-img" id="mImg" src="">
    <div class="modal-info">
      <div class="modal-name" id="mName"></div>
      <div class="modal-badges" id="mBadges"></div>
      <div class="modal-stats" id="mStats"></div>
      <div class="modal-effect-title" id="mEffectTitle" style="display:none">Effet</div>
      <div class="modal-effect" id="mEffect"></div>
      <div class="modal-trigger" id="mTrigger"></div>
      <button class="modal-close-btn" onclick="closeModal()">Fermer</button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active"><div class="nav-icon">🃏</div><div class="nav-label">Cartes</div></div>
  <div class="nav-item"><div class="nav-icon">📦</div><div class="nav-label">Collection</div></div>
  <div class="nav-item"><div class="nav-icon">❤️</div><div class="nav-label">Wishlist</div></div>
  <div class="nav-item"><div class="nav-icon">👤</div><div class="nav-label">Profil</div></div>
</div>

<script>
const SB_URL = "https://wrwtkpymlkzytassycww.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indyd3RrcHltbGt6eXRhc3N5Y3d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MTI3OTEsImV4cCI6MjA5NTk4ODc5MX0.z6SE6kRTKqtYpc7BBDfO9mfxQVi0Ol1FsrZlHzD4i3g";
const LIMIT = 60;

let state = { rarity: null, search: '', offset: 0, total: 0, loading: false };
let searchTimer = null;

const COLORS = { Red:'#ef4444', Blue:'#3b82f6', Green:'#22c55e', Yellow:'#eab308', Purple:'#a855f7', Black:'#9ca3af' };

async function fetchCards(append=false) {
  if (state.loading) return;
  state.loading = true;

  let params = [`limit=${LIMIT}`, `offset=${state.offset}`, `order=id`];
  if (state.search) params.push(`name=ilike.*${encodeURIComponent(state.search)}*`);
  if (state.rarity) params.push(`rarity=eq.${state.rarity}`);

  const url = `${SB_URL}/rest/v1/cards?${params.join('&')}`;
  const r = await fetch(url, {
    headers: {
      "apikey": SB_KEY,
      "Authorization": `Bearer ${SB_KEY}`,
      "Prefer": "count=exact"
    }
  });

  const total = parseInt(r.headers.get('content-range')?.split('/')[1] || '0');
  state.total = total;
  const cards = await r.json();
  state.loading = false;

  renderCards(cards, append);
  updateStats();
  updateLoadMore(cards.length);
}

function renderCards(cards, append) {
  const grid = document.getElementById('grid');

  if (!append) {
    if (!cards.length) {
      grid.innerHTML = `<div class="state-msg"><div class="icon">🔍</div><p>Aucune carte trouvée</p></div>`;
      return;
    }
    grid.innerHTML = '';
  }

  cards.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.style.animationDelay = `${(i % 20) * 0.02}s`;

    const colors = (c.colors || []).map(col => `<span class="dot dot-${col}" style="background:${COLORS[col]||'#888'}"></span>`).join('');
    const rClass = `r-${c.rarity || 'Common'}`;

    el.innerHTML = `
      <div class="card-img-wrap">
        <div class="rarity-banner ${rClass}"></div>
        <div class="card-placeholder">🃏</div>
        <img class="card-img loading" src="${c.image_url}" onload="this.classList.add('loaded')" onerror="this.style.display='none'">
      </div>
      <div class="card-body">
        <div class="card-name">${c.name || '—'}</div>
        <div class="card-sub">
          <span class="card-set">${c.set_id || ''}</span>
          <div class="color-dots">${colors}</div>
        </div>
      </div>`;

    el.onclick = () => openModal(c);
    grid.appendChild(el);
  });
}

function updateStats() {
  const bar = document.getElementById('statsBar');
  const shown = document.querySelectorAll('.card').length;
  bar.innerHTML = `<span>${shown}</span> / <span>${state.total}</span> cartes`;
}

function updateLoadMore(fetched) {
  const wrap = document.getElementById('loadMoreWrap');
  const btn = document.getElementById('loadMoreBtn');
  const shown = document.querySelectorAll('.card').length;
  if (shown < state.total && fetched === LIMIT) {
    wrap.style.display = 'block';
    btn.disabled = false;
  } else {
    wrap.style.display = 'none';
  }
}

function loadMore() {
  state.offset += LIMIT;
  fetchCards(true);
}

function setFilter(val, type, btn) {
  state[type] = val;
  state.offset = 0;
  document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  fetchCards();
}

function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.search = document.getElementById('searchInput').value;
    state.offset = 0;
    fetchCards();
  }, 350);
}

function openModal(c) {
  document.getElementById('mImg').src = c.image_url || '';
  document.getElementById('mName').textContent = c.name || '—';

  const badges = [
    `<span class="badge badge-rarity">${c.rarity || ''}</span>`,
    `<span class="badge badge-set">${c.set_id || ''}</span>`,
    ...(c.colors||[]).map(col => `<span class="badge badge-color" style="border-color:${COLORS[col]||'#888'}33;color:${COLORS[col]||'#888'}">${col}</span>`)
  ];
  document.getElementById('mBadges').innerHTML = badges.join('');

  const stats = [
    { val: c.cost ?? '—', lbl: 'Coût' },
    { val: c.power ? (c.power/1000)+'k' : '—', lbl: 'Puissance' },
    { val: c.counter ?? '—', lbl: 'Counter' },
  ];
  document.getElementById('mStats').innerHTML = stats.map(s =>
    `<div class="stat-box"><div class="stat-val">${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`
  ).join('');

  const hasEffect = c.effect && c.effect.trim();
  document.getElementById('mEffectTitle').style.display = hasEffect ? 'block' : 'none';
  document.getElementById('mEffect').textContent = c.effect || '';
  document.getElementById('mTrigger').textContent = c.trigger ? `⚡ Trigger: ${c.trigger}` : '';

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function handleModalClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

// Init
fetchCards();
</script>
</body>
</html>
